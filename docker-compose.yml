version: "3.9"

services:
  app:
    build: .
    ports:
      - "3000:3000"
      - "5555:5555"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/webhook_db
      REDIS_HOST: redis
      REDIS_PORT: 6379

  worker:
    build: .
    command: npm run worker
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/webhook_db
      REDIS_HOST: redis
      REDIS_PORT: 6379

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webhook_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
